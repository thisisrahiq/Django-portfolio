<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05050f;--bg2:#0a0a1a;--surface:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.08);--border-glow:rgba(139,92,246,0.4);
      --purple:#8b5cf6;--purple-lt:#a78bfa;--pink:#ec4899;
      --text:#e2e8f0;--muted:#64748b;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(139,92,246,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.03)1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
    .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;}
    .blob-1{width:400px;height:400px;background:rgba(139,92,246,0.15);top:-80px;left:-80px;}
    .blob-2{width:300px;height:300px;background:rgba(236,72,153,0.1);bottom:0;right:0;}
    .card{position:relative;z-index:1;background:rgba(10,10,26,0.8);border:1px solid var(--border);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:420px;backdrop-filter:blur(20px);}
    .lock-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;font-size:1.5rem;}
    .card-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#fff;margin-bottom:0.4rem;letter-spacing:-0.02em;}
    .card-sub{font-size:0.85rem;color:var(--muted);margin-bottom:2rem;}
    .form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.25rem;}
    .form-group label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
    .form-group input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:0.8rem 1rem;font-size:0.9rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%;}
    .form-group input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12);}
    .btn{width:100%;padding:0.85rem;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.2s,transform 0.2s,box-shadow 0.2s;box-shadow:0 0 20px rgba(139,92,246,0.3);}
    .btn:hover{opacity:0.9;transform:translateY(-1px);}
    .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;color:#f87171;margin-bottom:1.25rem;display:flex;align-items:center;gap:0.5rem;}
    .back-link{text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--muted);}
    .back-link a{color:var(--purple-lt);text-decoration:none;}
    .back-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="card">
  <div class="lock-icon">🔐</div>
  <div class="card-title">Admin Access</div>
  <p class="card-sub">Enter the admin password to view contact messages.</p>
  {% if error %}
  <div class="error">✗ {{ error }}</div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus required />
    </div>
    <button type="submit" class="btn">Unlock Dashboard →</button>
  </form>
  <div class="back-link"><a href="/">← Back to portfolio</a></div>
</div>
</body>
</html>
